        // --- State Management ---
        let state = {
            currentChapterId: 'ch1',
            fontSize: 18,
            fontFamily: 'font-garamond',
            theme: 'male-light',
            viewMode: 'both',
            highlights: [],
            memorize: [],
            bookmarks: []
        };

        // --- LOCAL STORAGE PERSISTENCE ---
        const STORAGE_KEY = 'theSekpriReaderState';

        function saveState() {
            try {
                const stateToStore = {
                    ...state,
                    memorize: state.memorize.map(m => ({
                        ...m,
                        audioBlobs: null
                    }))
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(stateToStore));
            } catch (e) {
                console.warn('Could not save state:', e);
            }
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                    state.memorize = state.memorize.map(m => ({
                        ...m,
                        sentences: m.sentences || ['', '', ''],
                        audioBlobs: [null, null, null]
                    }));
                    state.bookmarks = state.bookmarks || [];
                    state.highlights = state.highlights || [];
                    if (!state.currentChapterId) state.currentChapterId = 'ch1';
                } catch (e) {
                    console.warn('Could not parse saved state:', e);
                }
            }
        }

        function clearAllData() {
            if (confirm('Delete all your highlights, memorized words, and bookmarks?')) {
                localStorage.removeItem(STORAGE_KEY);
                state = {
                    currentChapterId: 'ch1',
                    fontSize: 18,
                    fontFamily: 'font-garamond',
                    theme: 'male-light',
                    viewMode: 'both',
                    highlights: [],
                    memorize: [],
                    bookmarks: []
                };
                renderTOC();
                loadChapter(state.currentChapterId);
                updateUIState();
                showToast('All data cleared');
            }
        }

        // --- DOM Elements ---
        const elReader = document.getElementById('reader');
        const elTocContainer = document.getElementById('tocContainer');
        const elSelectionBar = document.getElementById('selectionBar');
        const panels = document.querySelectorAll('.slide-panel');
        const elMobileOverlay = document.getElementById('mobileOverlay');
        const elSidebar = document.getElementById('sidebar');

        // --- Initialize ---
        function init() {
            loadState();
            renderTOC();
            loadChapter(state.currentChapterId);
            setupEventListeners();
            updateUIState();
            saveState();
        }

        // --- Toast ---
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => {
                setTimeout(() => toast.classList.add('show'), 10);
            });
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2800);
        }

        // --- Rendering ---
        function renderTOC() {
            elTocContainer.innerHTML = '';
            let chapterCounter = 1;

            bookData.forEach((act, actIndex) => {
                const actHeader = document.createElement('div');
                actHeader.className = 'toc-act';
                actHeader.innerHTML =
                    `<span>${act.act}</span> <i class="fas fa-chevron-down"></i>`;

                const actContent = document.createElement('div');
                actContent.className = `toc-act-content ${actIndex === 0 ? 'open' : ''}`;
                if (actIndex !== 0) {
                    actHeader.querySelector('i').classList.replace('fa-chevron-down', 'fa-chevron-right');
                }

                actHeader.onclick = () => {
                    actContent.classList.toggle('open');
                    const icon = actHeader.querySelector('i');
                    if (actContent.classList.contains('open')) {
                        icon.classList.replace('fa-chevron-right', 'fa-chevron-down');
                    } else {
                        icon.classList.replace('fa-chevron-down', 'fa-chevron-right');
                    }
                };

                elTocContainer.appendChild(actHeader);

                act.chapters.forEach(ch => {
                    const btn = document.createElement('button');
                    btn.className = `toc-chapter ${ch.id === state.currentChapterId ? 'active' : ''}`;
                    btn.innerHTML = `<span class="ch-num">${chapterCounter}.</span> ${ch.title.split('—')[1] || ch.title}`;
                    btn.onclick = () => { loadChapter(ch.id); if (window.innerWidth <= 600) toggleSidebar(); };
                    actContent.appendChild(btn);
                    chapterCounter++;
                });

                elTocContainer.appendChild(actContent);
            });
        }

        function loadChapter(chapterId) {
            state.currentChapterId = chapterId;
            let currentChapter = null;
            bookData.forEach(act => { const ch = act.chapters.find(c => c.id === chapterId); if (ch) currentChapter = ch; });
            if (!currentChapter) return;

            document.querySelectorAll('.toc-chapter').forEach(btn => btn.classList.remove('active'));
            let idx = 0;
            bookData.forEach(act => act.chapters.forEach(ch => { if (ch.id === chapterId) document.querySelectorAll(
                    '.toc-chapter')[idx].classList.add('active');
                idx++; }));

            let html = '';

            html +=
                `<div class="chapter-title" id="top-of-chapter">${currentChapter.title}</div><div class="chapter-sub">${currentChapter.subtitle}</div>`;

            currentChapter.blocks.forEach(block => {
                const enSafe = block.en.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const idSafe = block.id.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                html += `
                        <div class="para-group">
                            <div class="content-block en"><span class="lang-label">EN</span><p>${block.en}</p></div>
                            <div class="content-block id"><span class="lang-label">ID</span><p>${block.id}</p></div>
                        </div>
                    `;
            });

            const safeTitle = currentChapter.title.replace(/'/g, "\\'");
            html += `<div style="text-align:center; margin-top: 40px;">
                        <button class="tb-btn" onclick="addBookmark('${currentChapter.id}', '${safeTitle}')" style="padding:10px 20px;min-height:44px;">
                            <i class="far fa-bookmark"></i> Bookmark Chapter
                        </button>
                    </div>`;

            elReader.innerHTML = html;
            elReader.scrollTop = 0;
            applySavedMarkings();
            saveState();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            document.getElementById('toggleSidebar').addEventListener('click', toggleSidebar);
            elMobileOverlay.addEventListener('click', () => { closePanels(); if (window.innerWidth <= 600) elSidebar
                    .classList.remove('mobile-open');
                elMobileOverlay.classList.remove('show'); });

            document.querySelectorAll('#langToggle .tb-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('#langToggle .tb-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.viewMode = e.target.getAttribute('data-lang');
                    elReader.className = `view-${state.viewMode}`;
                    saveState();
                });
            });

            document.getElementById('themeSelect').addEventListener('change', (e) => { state.theme = e.target.value;
                document.documentElement.setAttribute('data-theme', state.theme);
                saveState(); });
            document.getElementById('fontSerif').addEventListener('click', () => setFont('font-garamond'));
            document.getElementById('fontSans').addEventListener('click', () => setFont('font-helvetica'));
            document.getElementById('fontInc').addEventListener('click', () => { state.fontSize = Math.min(34, state
                    .fontSize + 2);
                updateUIState();
                saveState(); });
            document.getElementById('fontDec').addEventListener('click', () => { state.fontSize = Math.max(12, state
                    .fontSize - 2);
                updateUIState();
                saveState(); });

            document.getElementById('btnBookmarks').addEventListener('click', () => openPanel('panelBookmarks'));
            document.getElementById('btnHighlights').addEventListener('click', () => openPanel('panelHighlights'));
            document.getElementById('btnMemorize').addEventListener('click', () => openPanel('panelMemorize'));

            document.addEventListener('selectionchange', handleSelectionDebounced);

            document.addEventListener('touchstart', (e) => {
                if (!elSelectionBar.contains(e.target) && elSelectionBar.classList.contains('show')) {
                    hideSelectionBar();
                }
            });
            document.addEventListener('mousedown', (e) => {
                if (!elSelectionBar.contains(e.target) && elSelectionBar.classList.contains('show')) {
                    hideSelectionBar();
                }
            });
            elReader.addEventListener('scroll', hideSelectionBar);

            document.getElementById('selHighlight').addEventListener('click', () => markSelection('highlight'));
            document.getElementById('selMemorize').addEventListener('click', () => markSelection('memorize'));

            elReader.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function updateUIState() {
            document.getElementById('fontSizeDisplay').textContent = state.fontSize;
            elReader.style.fontSize = `${state.fontSize}px`;

            document.body.classList.remove('font-garamond', 'font-helvetica');
            document.body.classList.add(state.fontFamily);
            document.getElementById('fontSerif').classList.toggle('active', state.fontFamily === 'font-garamond');
            document.getElementById('fontSans').classList.toggle('active', state.fontFamily === 'font-helvetica');

            document.getElementById('themeSelect').value = state.theme;
            document.documentElement.setAttribute('data-theme', state.theme);

            document.getElementById('memCount').textContent = state.memorize.length;
            renderLists();
        }

        function toggleSidebar() {
            if (window.innerWidth <= 600) {
                elSidebar.classList.toggle('mobile-open');
                elMobileOverlay.classList.toggle('show');
            } else {
                elSidebar.classList.toggle('collapsed');
            }
        }

        function setFont(font) { state.fontFamily = font;
            updateUIState();
            saveState(); }

        function openPanel(id) {
            closePanels();
            document.getElementById(id).classList.add('open');
            elMobileOverlay.classList.add('show');
        }

        function closePanels() {
            panels.forEach(p => p.classList.remove('open'));
            elMobileOverlay.classList.remove('show');
        }

        // --- Data Handling ---
        function renderLists() {
            const bkList = document.getElementById('bookmarksList');
            if (state.bookmarks.length === 0) {
                bkList.innerHTML = `<div class="list-empty"><i class="far fa-bookmark"></i>No bookmarks yet.</div>`;
            } else {
                bkList.innerHTML = state.bookmarks.map((b, i) => `
                        <div class="list-item">
                            <div class="item-text">${b.title}</div>
                            <div class="list-actions">
                                <button class="action-btn primary" onclick="goToSource('${b.chapterId}', 'top-of-chapter')"><i class="fas fa-external-link-alt"></i> Go</button>
                                <button class="action-btn danger" onclick="removeData('bookmarks', ${i})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`).join('');
            }

            const hlList = document.getElementById('highlightsList');
            if (state.highlights.length === 0) {
                hlList.innerHTML = `<div class="list-empty"><i class="fas fa-highlighter"></i>No highlights.</div>`;
            } else {
                hlList.innerHTML = state.highlights.map((h, i) => `
                        <div class="list-item">
                            <div class="item-text">"${h.text}"</div>
                            <div class="item-meta"><i class="fas fa-book-open"></i> ${h.chapterTitle}</div>
                            <div class="list-actions">
                                <button class="action-btn primary" onclick="goToSource('${h.chapterId}', '${h.id}')"><i class="fas fa-external-link-alt"></i> Go</button>
                                <button class="action-btn danger" onclick="removeData('highlights', ${i})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`).join('');
            }

            const memList = document.getElementById('memorizeList');
            if (state.memorize.length === 0) {
                memList.innerHTML = `<div class="list-empty"><i class="fas fa-brain"></i>No vocabulary saved.</div>`;
            } else {
                memList.innerHTML = state.memorize.map((m, i) => `
                        <div class="list-item">
                            <div class="item-text">${m.text}</div>
                            <div class="item-meta"><i class="fas fa-book-open"></i> ${m.chapterTitle}</div>
                            <div class="list-actions">
                                <button class="action-btn primary" onclick="openMemorizeScreen('${m.id}')"><i class="fas fa-graduation-cap"></i> Study</button>
                                <button class="action-btn" onclick="goToSource('${m.chapterId}', '${m.id}')"><i class="fas fa-external-link-alt"></i> Source</button>
                                <button class="action-btn danger" onclick="removeData('memorize', ${i})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`).join('');
            }
        }

        function goToSource(chapterId, markId) {
            closePanels();
            if (state.currentChapterId !== chapterId) {
                loadChapter(chapterId);
            }
            setTimeout(() => {
                const el = document.getElementById(markId);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.remove('target-flash');
                    void el.offsetWidth;
                    el.classList.add('target-flash');
                } else {
                    showToast("Could not locate the exact text.");
                }
            }, 120);
        }

        function addBookmark(chId, chTitle) {
            if (!state.bookmarks.find(b => b.chapterId === chId)) {
                state.bookmarks.push({ id: 'bm-' + Date.now(), chapterId: chId, title: chTitle });
                showToast("Bookmark added");
                updateUIState();
                saveState();
            }
        }

        function removeData(type, index) {
            state[type].splice(index, 1);
            updateUIState();
            if (type !== 'bookmarks') loadChapter(state.currentChapterId);
            showToast("Item removed");
            saveState();
        }

        // --- Smart Selection Tooltip ---
        let currentSelectionText = "";
        let currentRange = null;
        let selectionTimeout = null;

        function hideSelectionBar() {
            elSelectionBar.classList.remove('show');
            setTimeout(() => { if (!elSelectionBar.classList.contains('show')) elSelectionBar.style.display = 'none'; },
            200);
        }

        function handleSelectionDebounced() {
            clearTimeout(selectionTimeout);
            selectionTimeout = setTimeout(calculateSelection, 250);
        }

        function calculateSelection() {
            const selection = window.getSelection();
            const text = selection.toString().trim();

            if (text.length > 0 && selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                if (!elReader.contains(range.commonAncestorContainer)) {
                    hideSelectionBar();
                    return;
                }

                currentSelectionText = text;
                currentRange = range.cloneRange();

                const rect = range.getBoundingClientRect();
                if (!rect || (rect.width === 0 && rect.height === 0)) {
                    hideSelectionBar();
                    return;
                }

                elSelectionBar.style.display = 'flex';

                const BAR_OFFSET = 68;
                let top = rect.bottom + BAR_OFFSET;
                let left = rect.left + (rect.width / 2) - (elSelectionBar.offsetWidth / 2);

                if (top + elSelectionBar.offsetHeight > window.innerHeight - 20) {
                    top = rect.top - elSelectionBar.offsetHeight - 12;
                }
                if (top < 10) {
                    top = rect.bottom + 12;
                }
                if (left < 10) left = 10;
                if (left + elSelectionBar.offsetWidth > window.innerWidth - 10) {
                    left = window.innerWidth - elSelectionBar.offsetWidth - 10;
                }

                elSelectionBar.style.top = `${top}px`;
                elSelectionBar.style.left = `${left}px`;
                elSelectionBar.classList.add('show');
            } else {
                hideSelectionBar();
            }
        }

        function markSelection(type) {
            if (!currentSelectionText || !currentRange) return;

            const chapterTitle = document.querySelector('.chapter-title')?.textContent || 'Unknown';
            const markId = 'mark-' + Date.now();

            if (type === 'highlight') {
                state.highlights.push({ id: markId, text: currentSelectionText, chapterId: state.currentChapterId,
                    chapterTitle });
                showToast("Highlighted");
            } else {
                state.memorize.push({ id: markId, text: currentSelectionText, chapterId: state.currentChapterId,
                    chapterTitle, sentences: ['', '', ''], audioBlobs: [null, null, null] });
                showToast("Added to Vocabulary");
            }

            try {
                const span = document.createElement('span');
                span.id = markId;
                span.className = type === 'highlight' ? 'highlight' : 'highlight-memorize';
                currentRange.surroundContents(span);
            } catch (e) {
                loadChapter(state.currentChapterId);
            }

            window.getSelection().removeAllRanges();
            hideSelectionBar();
            updateUIState();
            saveState();
        }

        function applySavedMarkings() {
            const pTags = elReader.querySelectorAll('p');

            state.memorize.forEach(m => {
                if (m.chapterId === state.currentChapterId) {
                    pTags.forEach(p => {
                        if (p.innerHTML.includes(m.text) && !p.innerHTML.includes(`id="${m.id}"`)) {
                            p.innerHTML = p.innerHTML.replace(m.text,
                                `<span id="${m.id}" class="highlight-memorize">${m.text}</span>`);
                        }
                    });
                }
            });

            state.highlights.forEach(h => {
                if (h.chapterId === state.currentChapterId) {
                    pTags.forEach(p => {
                        if (p.innerHTML.includes(h.text) && !p.innerHTML.includes(`id="${h.id}"`)) {
                            p.innerHTML = p.innerHTML.replace(h.text,
                                `<span id="${h.id}" class="highlight">${h.text}</span>`);
                        }
                    });
                }
            });
        }

        // --- FOCUS MODE ---
        let currentFocusWordId = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let stream = null;
        let currentRecordingIndex = null;
        let currentRecordingMemId = null;

        function openMemorizeScreen(memId = null) {
            closePanels();
            document.getElementById('memorizeScreen').classList.add('active');
            renderMemorizeSidebar();

            if (!memId && state.memorize.length > 0) memId = state.memorize[0].id;

            if (memId) {
                loadFocusWord(memId);
            } else {
                document.getElementById('memCardContent').innerHTML =
                    `<div class="list-empty"><i class="fas fa-hand-pointer"></i>Add words to your vocabulary to study them here.</div>`;
            }
        }

        function closeMemorizeScreen() {
            document.getElementById('memorizeScreen').classList.remove('active');
            if (stream) { stream.getTracks().forEach(track => track.stop());
                stream = null; }
        }

        function renderMemorizeSidebar() {
            const sidebar = document.getElementById('memSidebarList');
            sidebar.innerHTML = state.memorize.map(m => `
                    <div class="mem-list-item ${m.id === currentFocusWordId ? 'active' : ''}" onclick="loadFocusWord('${m.id}')">
                        ${m.text}
                    </div>
                `).join('');
        }

        function loadFocusWord(memId) {
            currentFocusWordId = memId;
            renderMemorizeSidebar();
            const item = state.memorize.find(m => m.id === memId);
            if (!item) return;

            let sentencesHtml = '';
            for (let i = 0; i < 3; i++) {
                let audioHtml =
                    `<button class="btn-record-sm" id="recordBtn-${memId}-${i}" onclick="toggleRecord('${memId}', ${i})"><i class="fas fa-microphone"></i> Record</button>`;

                if (item.audioBlobs && item.audioBlobs[i]) {
                    const url = URL.createObjectURL(item.audioBlobs[i]);
                    audioHtml += `<audio src="${url}" controls></audio>
                                  <button class="action-btn danger" style="flex:0;min-width:40px;" onclick="deleteAudio('${memId}', ${i})"><i class="fas fa-trash"></i></button>`;
                }

                sentencesHtml += `
                        <div class="sentence-row">
                            <input type="text" placeholder="Example sentence ${i+1}..." value="${item.sentences[i]}" onchange="updateSentence('${memId}', ${i}, this.value)">
                            <div class="sentence-audio-group">
                                ${audioHtml}
                            </div>
                        </div>
                    `;
            }

            const content = `
                    <div class="mem-source"><i class="fas fa-book-open"></i> Source: ${item.chapterTitle}</div>
                    <h1>${item.text}</h1>
                    <div class="mem-section">
                        <h3><i class="fas fa-pen"></i> Example Sentences & Audio</h3>
                        <div class="mem-sentences">${sentencesHtml}</div>
                    </div>
                `;
            document.getElementById('memCardContent').innerHTML = content;
        }

        function updateSentence(memId, index, value) {
            const item = state.memorize.find(m => m.id === memId);
            if (item) {
                item.sentences[index] = value;
                saveState();
            }
        }

        async function toggleRecord(memId, index) {
            const btn = document.getElementById(`recordBtn-${memId}-${index}`);
            const item = state.memorize.find(m => m.id === memId);

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
                btn.classList.remove('recording');
                if (stream) { stream.getTracks().forEach(track => track.stop());
                    stream = null; }
            } else {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    currentRecordingIndex = index;
                    currentRecordingMemId = memId;

                    document.querySelectorAll('.btn-record-sm').forEach(b => {
                        b.classList.remove('recording');
                        b.innerHTML = `<i class="fas fa-microphone"></i> Record`;
                    });

                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        if (!item.audioBlobs) item.audioBlobs = [null, null, null];
                        item.audioBlobs[currentRecordingIndex] = audioBlob;
                        loadFocusWord(currentRecordingMemId);
                        showToast("Audio recorded!");
                        saveState();
                    };

                    mediaRecorder.start();
                    btn.innerHTML = `<i class="fas fa-stop"></i> Stop`;
                    btn.classList.add('recording');
                } catch (err) {
                    console.error(err);
                    showToast("Microphone access denied.");
                }
            }
        }

        function deleteAudio(memId, index) {
            const item = state.memorize.find(m => m.id === memId);
            if (item && item.audioBlobs) {
                item.audioBlobs[index] = null;
                loadFocusWord(memId);
                saveState();
            }
        }

        // --- Run ---
        init();

        window.addEventListener('orientationchange', () => {
            setTimeout(hideSelectionBar, 300);
        });
        window.addEventListener('resize', () => {
            setTimeout(hideSelectionBar, 200);
        });
    </script>
</body>
</html>
