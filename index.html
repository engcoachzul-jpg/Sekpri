                    { en: "A second message arrived before I finished reading the first.",
                        id: "Pesan kedua masuk sebelum saya selesai membaca yang pertama." },
                    { en: "You still have parents, don't you?",
                        id: "Orang tuamu masih ada, bukan?" },
                    { en: "I deleted both. Not because they were unimportant. Because they had become routine.",
                        id: "Saya menghapus keduanya. Bukan karena tidak penting. Karena itu sudah menjadi rutinitas." },
                    { en: "At breakfast, the Mayor noticed immediately.",
                        id: "Saat sarapan, wali kota langsung menyadarinya." },
                    { en: "\"You've received them.\"",
                        id: "\"Sudah mulai masuk.\"" },
                    { en: "\"Yes, Sir.\"",
                        id: "\"Ya, Pak.\"" },
                    { en: "\"How many?\"",
                        id: "\"Berapa?\"" },
                    { en: "\"Twenty-three messages. Three anonymous calls. One envelope.\"",
                        id: "\"Dua puluh tiga pesan. Tiga panggilan anonim. Satu amplop.\"" },
                    { en: "He looked up.",
                        id: "Beliau mengangkat kepala." },
                    { en: "\"What was in the envelope?\"",
                        id: "\"Isi amplopnya?\"" },
                    { en: "\"Nothing. Only a photograph of my parents' house.\"",
                        id: "\"Tidak ada apa-apa. Hanya foto rumah orang tua saya.\"" },
                    { en: "He remained silent for several seconds. Then continued eating.",
                        id: "Beliau terdiam beberapa detik. Lalu melanjutkan sarapan." },
                    { en: "\"We'll report it after breakfast.\"",
                        id: "\"Setelah sarapan kita laporkan.\"" },
                    { en: "No panic. No anger. Procedure. Everything had a procedure.",
                        id: "Tidak panik. Tidak marah. Prosedur. Segala sesuatu memiliki prosedur." },
                    { en: "At 07:45, we met with the Chief of Municipal Security.",
                        id: "Pukul 07.45, kami bertemu Kepala Pengamanan Pemerintah Kota." },
                    { en: "He placed a folder on the table.",
                        id: "Beliau meletakkan sebuah map di atas meja." },
                    { en: "\"Three similar incidents this month. Anonymous intimidation. No direct attack. Not yet.\"",
                        id: "\"Tiga kejadian serupa bulan ini. Intimidasi anonim. Belum ada serangan langsung. Belum.\"" },
                    { en: "The room became quiet.",
                        id: "Ruangan menjadi hening." },
                    { en: "The Mayor closed the folder.",
                        id: "Wali kota menutup map tersebut." },
                    { en: "\"We increase security.\"",
                        id: "\"Tingkatkan pengamanan.\"" },
                    { en: "\"Yes, Sir.\"",
                        id: "\"Siap, Pak.\"" },
                    { en: "\"We do not increase fear.\"",
                        id: "\"Jangan tingkatkan rasa takut.\"" },
                    { en: "The officer nodded.",
                        id: "Perwira itu mengangguk." },
                    { en: "As we walked back toward the office, I asked a question I had never asked before.",
                        id: "Saat kami berjalan kembali menuju kantor, saya mengajukan pertanyaan yang belum pernah saya ajukan sebelumnya." },
                    { en: "\"Sir. Did you receive these when you first became Mayor?\"",
                        id: "\"Pak. Apakah dulu Bapak juga menerima ancaman seperti ini saat pertama menjadi wali kota?\"" },
                    { en: "He smiled without looking at me.",
                        id: "Beliau tersenyum tanpa menoleh." },
                    { en: "\"I received worse.\"",
                        id: "\"Saya menerima yang lebih buruk.\"" },
                    { en: "\"When?\"",
                        id: "\"Kapan?\"" },
                    { en: "\"The first week.\"",
                        id: "\"Minggu pertama.\"" },
                    { en: "\"What happened?\"",
                        id: "\"Apa yang terjadi?\"" },
                    { en: "\"A contractor sent flowers.\"",
                        id: "\"Seorang kontraktor mengirim bunga.\"" },
                    { en: "I looked confused.",
                        id: "Saya tampak bingung." },
                    { en: "\"The card read... Congratulations on your election. We look forward to our mutually beneficial relationship.\"",
                        id: "\"Kartu ucapannya berbunyi... Selamat atas pelantikan Anda. Kami menantikan hubungan yang saling menguntungkan.\"" },
                    { en: "\"What did you do?\"",
                        id: "\"Apa yang Bapak lakukan?\"" },
                    { en: "\"I returned the flowers.\"",
                        id: "\"Saya mengembalikan bunganya.\"" },
                    { en: "\"And?\"",
                        id: "\"Lalu?\"" },
                    { en: "\"They never sent flowers again.\"",
                        id: "\"Mereka tidak pernah mengirim bunga lagi.\"" },
                    { en: "We entered the Mayor's office.",
                        id: "Kami memasuki ruang kerja wali kota." },
                    { en: "He placed his notebook on the desk.",
                        id: "Beliau meletakkan buku catatannya di meja." },
                    { en: "\"Ardi.\"",
                        id: "\"Ardi.\"" },
                    { en: "\"Yes, Sir.\"",
                        id: "\"Ya, Pak.\"" },
                    { en: "\"You know the strange thing about corruption?\"",
                        id: "\"Tahukah kamu hal yang aneh tentang korupsi?\"" },
                    { en: "I waited.",
                        id: "Saya menunggu." },
                    { en: "\"People think it begins with billions. It doesn't. It begins with wanting to avoid uncomfortable conversations.\"",
                        id: "\"Orang mengira korupsi dimulai dari miliaran rupiah. Padahal tidak. Korupsi dimulai ketika seseorang ingin menghindari percakapan yang tidak nyaman.\"" },
                    { en: "He sat down.",
                        id: "Beliau duduk." },
                    { en: "\"Someone asks for a favor. You don't want conflict. So you make one exception. The next exception becomes easier. And eventually... you no longer remember where the rules ended.\"",
                        id: "\"Seseorang meminta bantuan. Kamu tidak ingin konflik. Maka kamu membuat satu pengecualian. Pengecualian berikutnya menjadi lebih mudah. Lalu pada akhirnya... kamu tidak lagi ingat di mana batas peraturan itu.\"" },
                    { en: "I wrote every sentence down. Not because I would forget. Because they deserved to be preserved.",
                        id: "Saya menuliskan setiap kalimat itu. Bukan karena saya akan lupa. Melainkan karena kalimat-kalimat itu layak disimpan." },
                    { en: "At 10:15, another visitor arrived without an appointment.",
                        id: "Pukul 10.15, seorang tamu lain datang tanpa janji." },
                    { en: "This time it was a businessman. Expensive watch. Perfect suit. Perfect smile.",
                        id: "Kali ini seorang pengusaha. Jam tangan mahal. Setelan jas sempurna. Senyum sempurna." },
                    { en: "He introduced himself politely.",
                        id: "Beliau memperkenalkan diri dengan sopan." },
                    { en: "\"I only wish to contribute.\"",
                        id: "\"Saya hanya ingin berkontribusi.\"" },
                    { en: "\"I appreciate that.\"",
                        id: "\"Saya menghargainya.\"" },
                    { en: "He placed a thick envelope on my desk.",
                        id: "Beliau meletakkan sebuah amplop tebal di meja saya." },
                    { en: "\"For your foundation.\"",
                        id: "\"Untuk yayasan Bapak.\"" },
                    { en: "\"I don't have one.\"",
                        id: "\"Saya tidak memiliki yayasan.\"" },
                    { en: "\"For your family.\"",
                        id: "\"Kalau begitu untuk keluarga Bapak.\"" },
                    { en: "\"They earn their own living.\"",
                        id: "\"Mereka mencari nafkah sendiri.\"" },
                    { en: "He hesitated.",
                        id: "Beliau ragu sejenak." },
                    { en: "\"For anything you think is appropriate.\"",
                        id: "\"Untuk apa saja yang menurut Bapak pantas.\"" },
                    { en: "I pushed the envelope back across the table.",
                        id: "Saya mendorong kembali amplop itu ke arahnya." },
                    { en: "\"Then it's appropriate for you to take it home.\"",
                        id: "\"Kalau begitu, yang paling pantas adalah Bapak membawanya pulang.\"" },
                    { en: "He left without another word. I never opened the envelope. I never needed to know how much was inside. Some numbers are irrelevant.",
                        id: "Beliau pergi tanpa berkata apa-apa lagi. Saya tidak pernah membuka amplop itu. Saya tidak pernah perlu mengetahui berapa isinya. Ada angka yang memang tidak perlu diketahui." },
                    { en: "That afternoon, I submitted the incident report. Threats. Attempted bribery. Evidence attached. The report was only four pages. The consequences would be much longer.",
                        id: "Sore harinya, saya menyerahkan laporan kejadian tersebut. Ancaman. Percobaan penyuapan. Bukti dilampirkan. Laporannya hanya empat halaman. Akibatnya akan jauh lebih panjang." },
                    { en: "As we prepared to leave City Hall, the Mayor stopped beside the entrance.",
                        id: "Saat kami bersiap meninggalkan Balai Kota, wali kota berhenti di dekat pintu keluar." },
                    { en: "The evening shift of cleaners had just begun. One of them bowed slightly as we passed. The Mayor nodded back.",
                        id: "Petugas kebersihan sif malam baru mulai bekerja. Seorang dari mereka menundukkan kepala saat kami lewat. Wali kota membalas anggukan itu." },
                    { en: "Then he spoke quietly.",
                        id: "Lalu beliau berbicara pelan." },
                    { en: "\"Ardi. We're not protecting the budget. We're protecting people who will never attend these meetings.\"",
                        id: "\"Ardi. Kita bukan sedang melindungi anggaran. Kita sedang melindungi orang-orang yang tidak pernah hadir dalam rapat-rapat ini.\"" },
                    { en: "He looked toward the cleaner pushing her cart down the corridor.",
                        id: "Beliau memandang petugas kebersihan yang sedang mendorong troli di lorong." },
                    { en: "\"She already paid her taxes. Our job is to make sure every rupiah comes back to her.\"",
                        id: "\"Dia sudah membayar pajaknya. Tugas kita memastikan setiap rupiah itu kembali kepadanya dalam bentuk pelayanan.\"" },
                    { en: "I looked down the long corridor of City Hall. The threats would continue tomorrow. So would the meetings. So would the budget. And so would we.",
                        id: "Saya memandang lorong panjang Balai Kota. Besok ancaman akan datang lagi. Begitu pula rapat-rapat. Begitu pula anggaran. Dan kami pun akan kembali." }
                ]
            }, {
                id: "ch6",
                title: "Chapter 6 — An Ordinary Evening",
                subtitle: "Civilizations are built twice: first in ideas, then in concrete.",
                blocks: [
                    { en: "By 20:40, the last meeting had ended.",
                        id: "Pukul 20.40, rapat terakhir selesai." },
                    { en: "City Hall grew quiet. Cleaning crews replaced department heads. The elevators stopped every few minutes instead of every few seconds.",
                        id: "Balai Kota mulai lengang. Petugas kebersihan menggantikan para kepala dinas. Lift berhenti setiap beberapa menit, bukan setiap beberapa detik." },
                    { en: "For most officials, the workday had ended. For the Mayor and me, it had merely changed location.",
                        id: "Bagi sebagian besar pejabat, hari kerja telah berakhir. Bagi saya dan wali kota, pekerjaan hanya berpindah tempat." },
                    { en: "We walked home. Not because it was ceremonial. Our official residences stood only fifty meters from City Hall.",
                        id: "Kami berjalan pulang. Bukan karena alasan seremonial. Rumah dinas kami hanya berjarak sekitar lima puluh meter dari Balai Kota." },
                    { en: "The security detail followed several steps behind. Far enough to give privacy. Close enough to react.",
                        id: "Tim pengamanan mengikuti beberapa langkah di belakang. Cukup jauh untuk memberi ruang pribadi. Cukup dekat untuk bereaksi." },
                    { en: "Dinner was simple. Rice. Grilled fish. Vegetables. Tea. No official guests. No photographers. No speeches.",
                        id: "Makan malamnya sederhana. Nasi. Ikan bakar. Sayuran. Teh. Tidak ada tamu resmi. Tidak ada fotografer. Tidak ada pidato." },
                    { en: "This hour belonged to conversation.",
                        id: "Jam seperti ini milik percakapan." },
                    { en: "The Mayor looked toward the bookshelf in the dining room.",
                        id: "Wali kota memandang rak buku di ruang makan." },
                    { en: "\"What are you reading this week, Ardi?\"",
                        id: "\"Sedang membaca apa minggu ini, Ardi?\"" },
                    { en: "I answered without thinking.",
                        id: "Saya menjawab tanpa berpikir lama." },
                    { en: "\"Three books. One on urban transport. One on the economic reforms of China. And one on Singapore's public housing.\"",
                        id: "\"Tiga buku. Satu tentang transportasi perkotaan. Satu tentang reformasi ekonomi Tiongkok. Dan satu tentang perumahan publik Singapura.\"" },
                    { en: "He smiled.",
                        id: "Beliau tersenyum." },
                    { en: "\"So nothing light.\"",
                        id: "\"Berarti tidak ada bacaan ringan.\"" },
                    { en: "\"I don't think our work allows light reading.\"",
                        id: "\"Saya rasa pekerjaan kita tidak memberi banyak ruang untuk bacaan ringan.\"" },
                    { en: "He laughed softly.",
                        id: "Beliau tertawa pelan." },
                    { en: "\"Fair enough.\"",
                        id: "\"Ada benarnya.\"" },
                    { en: "For a while, we ate in silence. The silence was comfortable. Not empty.",
                        id: "Beberapa saat kami makan dalam diam. Keheningan itu terasa nyaman. Bukan kosong." },
                    { en: "The Mayor poured more tea.",
                        id: "Wali kota menuangkan teh lagi." },
                    { en: "\"People often ask how China grew so quickly. They mention factories. They mention exports. They mention high-speed rail.\"",
                        id: "\"Orang sering bertanya bagaimana Tiongkok bisa tumbuh begitu cepat. Mereka menyebut pabrik. Mereka menyebut ekspor. Mereka menyebut kereta cepat.\"" },
                    { en: "He shook his head.",
                        id: "Beliau menggeleng." },
                    { en: "\"I think they miss something.\"",
                        id: "\"Menurut saya mereka melewatkan sesuatu.\"" },
                    { en: "\"What is it, Sir?\"",
                        id: "\"Apa itu, Pak?\"" },
                    { en: "\"They produced administrators. Millions of them. People who could implement. Policies fail long before construction. They fail on someone's desk.\"",
                        id: "\"Mereka menghasilkan administrator. Jutaan orang. Orang-orang yang mampu melaksanakan. Kebijakan gagal jauh sebelum pembangunan dimulai. Kebijakan gagal di atas meja seseorang.\"" },
                    { en: "I nodded.",
                        id: "Saya mengangguk." },
                    { en: "\"The same with Singapore. They're admired for clean streets. But clean streets come from clean administration. If procurement fails... maintenance fails. If maintenance fails... the city fails.\"",
                        id: "\"Begitu pula Singapura. Mereka dikagumi karena jalannya bersih. Padahal jalan yang bersih berasal dari administrasi yang bersih. Kalau pengadaannya gagal... pemeliharaannya ikut gagal. Kalau pemeliharaannya gagal... kotanya ikut gagal.\"" },
                    { en: "The Mayor looked pleased.",
                        id: "Wali kota tampak puas." },
                    { en: "\"Exactly.\"",
                        id: "\"Tepat.\"" },
                    { en: "He stood and walked to the bookshelf. He pulled out a worn notebook. It contained handwritten notes collected over decades. No speeches. No campaign promises. Only observations.",
                        id: "Beliau berdiri dan berjalan menuju rak buku. Beliau mengambil sebuah buku catatan yang sudah usang. Isinya catatan tangan yang dikumpulkan selama puluhan tahun. Bukan pidato. Bukan janji kampanye. Hanya pengamatan." },
                    { en: "He opened one page.",
                        id: "Beliau membuka satu halaman." },
                    { en: "\"I wrote this fifteen years ago.\"",
                        id: "\"Saya menulis ini lima belas tahun lalu.\"" },
                    { en: "He handed it to me. The sentence was short.",
                        id: "Beliau menyerahkannya kepada saya. Kalimatnya pendek." },
                    { en: "A corrupt government can still build. It simply builds at twice the cost and half the quality.",
                        id: "Pemerintah yang korup masih bisa membangun. Hanya saja biayanya menjadi dua kali lipat dan mutunya tinggal setengahnya." },
                    { en: "I read it twice. Then looked up.",
                        id: "Saya membacanya dua kali. Lalu mengangkat kepala." },
                    { en: "\"That's exactly what we're fighting.\"",
                        id: "\"Itulah yang sedang kita lawan.\"" },
                    { en: "He nodded.",
                        id: "Beliau mengangguk." },
                    { en: "After dinner, we moved to the study. I opened tomorrow's schedule. Seven meetings. Two inspections. One budget review. One online conference with the National Metropolitan Development Authority.",
                        id: "Setelah makan malam, kami berpindah ke ruang kerja. Saya membuka jadwal untuk esok hari. Tujuh rapat. Dua inspeksi lapangan. Satu evaluasi anggaran. Satu konferensi daring dengan Otorita Pembangunan Metropolitan Nasional." },
                    { en: "The Mayor reviewed every page. Then closed the folder.",
                        id: "Wali kota meninjau setiap halaman. Lalu menutup map tersebut." },
                    { en: "\"You know what is different now?\"",
                        id: "\"Tahukah kamu apa yang berbeda sekarang?\"" },
                    { en: "\"What, Sir?\"",
                        id: "\"Apa, Pak?\"" },
                    { en: "\"If we wanted to misuse the budget... we couldn't.\"",
                        id: "\"Kalaupun kita ingin menyalahgunakan anggaran... kita tidak bisa.\"" },
                    { en: "I smiled.",
                        id: "Saya tersenyum." },
                    { en: "\"Too many controls.\"",
                        id: "\"Terlalu banyak pengendalian.\"" },
                    { en: "He counted them on his fingers.",
                        id: "Beliau menghitung dengan jari." },
                    { en: "\"Digital procurement. Electronic invoices. AI anomaly detection. Real-time treasury monitoring. Public budget dashboard. Automatic audit trails.\"",
                        id: "\"Pengadaan digital. Faktur elektronik. Deteksi anomali oleh AI. Pemantauan kas secara waktu nyata. Dasbor anggaran yang terbuka untuk publik. Jejak audit otomatis.\"" },
                    { en: "He smiled.",
                        id: "Beliau tersenyum." },
                    { en: "\"In the past... someone could invent a study tour. Spend the weekend shopping. And write... 'Capacity Building Activity.'\"",
                        id: "\"Dulu... orang bisa mengarang studi banding. Menghabiskan akhir pekan untuk berbelanja. Lalu menulis... 'Kegiatan Peningkatan Kapasitas'.\"" },
                    { en: "I laughed.",
                        id: "Saya tertawa." },
                    { en: "\"So could we.\"",
                        id: "\"Kalau begitu kita juga bisa.\"" },
                    { en: "He looked at me.",
                        id: "Beliau memandang saya." },
                    { en: "\"No. The system wouldn't let us. The budget line wouldn't match. The GPS wouldn't match. The invoices wouldn't match. The AI would flag it before breakfast.\"",
                        id: "\"Tidak. Sistemnya tidak akan mengizinkan. Kode anggarannya tidak akan cocok. Lokasi GPS tidak akan cocok. Fakturnya tidak akan cocok. AI akan menandainya bahkan sebelum kita sarapan.\"" },
                    { en: "For a moment, neither of us spoke.",
                        id: "Beberapa saat kami sama-sama diam." },
                    { en: "Then the Mayor said quietly, \"Good. We should build a system that doesn't depend on good people. We won't be here forever. The rules must remain after we're gone.\"",
                        id: "Lalu wali kota berkata pelan, \"Bagus. Kita harus membangun sistem yang tidak bergantung pada orang baik. Kita tidak akan berada di sini selamanya. Peraturannya harus tetap hidup setelah kita pergi.\"" },
                    { en: "I closed tomorrow's briefing folder. It was 22:18. Tomorrow's documents were ready. Tomorrow's meetings were confirmed. Tomorrow's risks had been identified.",
                        id: "Saya menutup map pengarahan untuk esok hari. Jam menunjukkan pukul 22.18. Dokumen untuk esok hari telah siap. Rapat-rapat besok telah terkonfirmasi. Risiko-risiko besok telah dipetakan." },
                    { en: "Outside, the city lights stretched toward the horizon. Three years earlier, many of those lights had not existed. Neither had the roads beneath them. Or the bus corridors. Or the flood canals.",
                        id: "Di luar, lampu kota membentang hingga ke cakrawala. Tiga tahun sebelumnya, banyak lampu itu belum ada. Begitu pula jalan-jalan di bawahnya. Atau koridor busnya. Atau kanal pengendali banjirnya." },
                    { en: "Ideas had become plans. Plans had become budgets. Budgets had become cities. And tomorrow morning, at 05:27, the work would begin again.",
                        id: "Gagasan telah menjadi rencana. Rencana telah menjadi anggaran. Anggaran telah menjadi kota. Dan besok pagi, pukul 05.27, semuanya akan dimulai lagi." }
                ]
            }, {
                id: "ch7",
                title: "Chapter 7 — Five Hundred Trillion",
                subtitle: "A national budget is not measured by how much is spent, but by how much is built.",
                blocks: [
                    { en: "Thursday began in the National Metropolitan Development Command Center.",
                        id: "Hari Kamis dimulai di Pusat Komando Pembangunan Metropolitan Nasional." },
                    { en: "Unlike most meetings, this one involved all forty cities. Forty mayors. Forty private secretaries. Forty finance teams. One national dashboard.",
                        id: "Berbeda dengan rapat-rapat lainnya, rapat ini melibatkan seluruh empat puluh kota. Empat puluh wali kota. Empat puluh sekretaris pribadi. Empat puluh tim keuangan. Satu dasbor nasional." },
                    { en: "At 08:00 sharp, the giant display came alive. Forty green dots appeared across the map of Indonesia. Every dot represented a city. Every city represented responsibility.",
                        id: "Tepat pukul 08.00, layar raksasa mulai menyala. Empat puluh titik hijau muncul di peta Indonesia. Setiap titik mewakili satu kota. Setiap kota mewakili tanggung jawab." },
                    { en: "The moderator spoke briefly.",
                        id: "Moderator berbicara singkat." },
                    { en: "\"Three years have passed. The program budget remains unchanged. Five hundred trillion rupiah. Five years. No supplementary allocation. No emergency bailout. If one city wastes money... another city builds less.\"",
                        id: "\"Tiga tahun telah berlalu. Total anggaran program tetap tidak berubah. Lima ratus triliun rupiah. Lima tahun. Tidak ada anggaran tambahan. Tidak ada penyelamatan anggaran. Jika satu kota memboroskan anggaran... kota lain akan membangun lebih sedikit.\"" },
                    { en: "I opened the financial summary prepared the previous night.",
                        id: "Saya membuka ringkasan keuangan yang saya siapkan semalam." },
                    { en: "Total national allocation: Rp500 trillion. Program duration: 5 years. Average annual expenditure: Rp100 trillion. Forty cities. Average annual allocation per city: Rp2.5 trillion.",
                        id: "Total alokasi nasional: Rp500 triliun. Durasi program: 5 tahun. Rata-rata belanja per tahun: Rp100 triliun. Empat puluh kota. Rata-rata alokasi per kota per tahun: Rp2,5 triliun." },
                    { en: "Not equal. Population. Economic output. Infrastructure deficit. Disaster risk. Each variable adjusted the final amount.",
                        id: "Bukan sama rata. Disesuaikan jumlah penduduk. Keluaran ekonomi. Kesenjangan infrastruktur. Risiko bencana. Setiap variabel memengaruhi besaran akhir yang diterima." },
                    { en: "Our city received: Rp2.94 trillion this year. Combined with the municipal budget... the development budget reached Rp27.5 trillion.",
                        id: "Kota kami menerima: Rp2,94 triliun tahun ini. Digabungkan dengan APBD kota... anggaran pembangunan mencapai Rp27,5 triliun." },
                    { en: "Every rupiah already had a destination.",
                        id: "Setiap rupiah telah memiliki tujuan." },
                    { en: "The national dashboard changed. Infrastructure Progress. Road construction. 62%. Urban rail and BRT. 58%. Flood mitigation. 65%. Schools. 71%. Hospitals. 67%. Digital government. 89%.",
                        id: "Dasbor nasional berganti tampilan. Kemajuan Infrastruktur. Pembangunan jalan. 62%. Transportasi rel dan BRT. 58%. Pengendalian banjir. 65%. Sekolah. 71%. Rumah sakit. 67%. Pemerintahan digital. 89%." },
                    { en: "The numbers looked encouraging. The Mayor remained expressionless.",
                        id: "Angka-angka itu tampak menggembirakan. Wali kota tetap tanpa ekspresi." },
                    { en: "He leaned toward me.",
                        id: "Beliau sedikit mendekat kepada saya." },
                    { en: "\"Percentages. They comfort politicians. I want kilometers. Hospitals. Classrooms. Bus passengers.\"",
                        id: "\"Persentase. Persentase membuat politisi merasa nyaman. Saya ingin kilometer. Rumah sakit. Ruang kelas. Penumpang bus.\"" },
                    { en: "I already knew. The next page was ready. I quietly turned the page.",
                        id: "Saya sudah tahu. Halaman berikutnya sudah siap. Saya membalik halaman itu secara perlahan." },
                    { en: "Nationally. Roads completed: 2,842 kilometers. Urban rail: 147 kilometers. BRT corridors: 611 kilometers. Schools built or renovated: 1,186. Hospitals: 124. Community clinics: 973. Flood retention ponds: 216. Drinking water connections: 3.8 million households.",
                        id: "Secara nasional. Jalan selesai dibangun: 2.842 kilometer. Jalur kereta perkotaan: 147 kilometer. Koridor BRT: 611 kilometer. Sekolah dibangun atau direnovasi: 1.186 unit. Rumah sakit: 124 unit. Puskesmas: 973 unit. Kolam retensi: 216 unit. Sambungan air bersih: 3,8 juta rumah tangga." },
                    { en: "The Mayor nodded.",
                        id: "Wali kota mengangguk." },
                    { en: "\"That's the budget.\"",
                        id: "\"Nah, itu baru anggaran.\"" },
                    { en: "The moderator continued.",
                        id: "Moderator melanjutkan paparannya." },
                    { en: "\"National financial realization. Authorized: Rp300 trillion. Spent: Rp287.4 trillion. Efficiency savings: Rp12.6 trillion.\"",
                        id: "\"Realisasi keuangan nasional. Dianggarkan: Rp300 triliun. Direalisasikan: Rp287,4 triliun. Efisiensi: Rp12,6 triliun.\"" },
                    { en: "The room remained silent. No applause. Savings were not trophies. They were opportunities.",
                        id: "Ruangan tetap hening. Tidak ada tepuk tangan. Efisiensi bukan piala. Efisiensi adalah peluang." },
                    { en: "The Minister appearing on screen spoke.",
                        id: "Menteri yang muncul di layar berbicara." },
                    { en: "\"The Rp12.6 trillion is not returned to the Treasury. It remains inside the program. It will finance additional projects.\"",
                        id: "\"Rp12,6 triliun efisiensi tidak dikembalikan ke kas negara. Dana tetap berada di dalam program. Dana akan membiayai proyek tambahan.\"" },
                    { en: "Immediately, another screen appeared. Additional schools. Additional hospitals. Additional flood barriers. Additional buses.",
                        id: "Seketika layar lain muncul. Sekolah tambahan. Rumah sakit tambahan. Tanggul tambahan. Bus tambahan." },
                    { en: "Efficiency had become development.",
                        id: "Efisiensi berubah menjadi pembangunan." },
                    { en: "The Mayor whispered.",
                        id: "Wali kota berbisik." },
                    { en: "\"That's why we fight. Not to spend less. To build more.\"",
                        id: "\"Itulah alasan kita berjuang. Bukan supaya membelanjakan lebih sedikit. Melainkan supaya membangun lebih banyak.\"" },
                    { en: "The final session began. Every mayor had exactly two minutes. No speeches. No slogans. Only results.",
                        id: "Sesi terakhir dimulai. Setiap wali kota mendapat waktu tepat dua menit. Tanpa pidato. Tanpa slogan. Hanya hasil." },
                    { en: "When our city's turn arrived, the Mayor stood. He never looked at his notes.",
                        id: "Ketika giliran kota kami tiba, wali kota berdiri. Beliau tidak pernah melihat catatannya." },
                    { en: "\"Our city received Rp8.82 trillion from the national program over three years. We have completed sixty-one percent of planned infrastructure. Our projects remain within budget. Our procurement process has been suspended twice due to detected collusion. We consider that a success.\"",
                        id: "\"Kota kami menerima Rp8,82 triliun dari program nasional selama tiga tahun. Kami telah menyelesaikan enam puluh satu persen target infrastruktur. Seluruh proyek masih berada dalam batas anggaran. Proses pengadaan kami telah dua kali dihentikan karena terdeteksi persekongkolan. Kami menganggap itu sebagai keberhasilan.\"" },
                    { en: "Several mayors looked up.",
                        id: "Beberapa wali kota mengangkat kepala." },
                    { en: "The Mayor continued.",
                        id: "Wali kota melanjutkan." },
                    { en: "\"A delayed honest project is less expensive than a completed corrupt project.\"",
                        id: "\"Proyek yang jujur tetapi tertunda lebih murah daripada proyek korup yang selesai tepat waktu.\"" },
                    { en: "His microphone switched off automatically. Two minutes exactly.",
                        id: "Mikrofonnya otomatis dimatikan. Tepat dua menit." },
                    { en: "The meeting ended at noon.",
                        id: "Rapat berakhir tepat tengah hari." },
                    { en: "As we walked back to the vehicle, I asked quietly, \"Sir. Do you think we'll finish everything by the fifth year?\"",
                        id: "Saat kami berjalan kembali menuju kendaraan, saya bertanya pelan, \"Pak. Menurut Bapak, kita akan menyelesaikan semuanya pada tahun kelima?\"" },
                    { en: "He looked toward the construction cranes surrounding the city skyline.",
                        id: "Beliau memandang derek-derek konstruksi yang memenuhi cakrawala kota." },
                    { en: "\"No.\"",
                        id: "\"Tidak.\"" },
                    { en: "I was surprised.",
                        id: "Saya sedikit terkejut." },
                    { en: "He smiled.",
                        id: "Beliau tersenyum." },
                    { en: "\"No country ever finishes development. Our task isn't to finish. Our task is to leave the next administration a city that's better than the one we inherited. And to leave them a system that's harder to corrupt.\"",
                        id: "\"Tidak ada negara yang benar-benar selesai membangun. Tugas kita bukan menyelesaikan semuanya. Tugas kita adalah mewariskan kota yang lebih baik daripada yang kita terima. Dan mewariskan sistem yang semakin sulit untuk dikorupsi.\"" },
                    { en: "He opened the car door.",
                        id: "Beliau membuka pintu mobil." },
                    { en: "I closed my notebook. Five hundred trillion rupiah. It had never really been about the money. It was about what the money became.",
                        id: "Saya menutup buku catatan saya. Lima ratus triliun rupiah. Ternyata sejak awal memang bukan soal uangnya. Melainkan tentang menjadi apa uang itu pada akhirnya." }
                ]
            }, {
                id: "ch8",
                title: "Chapter 8 — The Conversation",
                subtitle: "A government survives elections. An institution survives generations.",
                blocks: [
                    { en: "Friday evening. For the first time that week, there were no scheduled meetings after sunset.",
                        id: "Jumat sore. Untuk pertama kalinya minggu itu, tidak ada rapat yang dijadwalkan setelah matahari terbenam." },
                    { en: "No procurement reviews. No inspections. No conferences. Only tomorrow's briefing, already prepared.",
                        id: "Tidak ada evaluasi pengadaan. Tidak ada inspeksi lapangan. Tidak ada konferensi. Hanya bahan pengarahan untuk esok hari yang sudah selesai disiapkan." },
                    { en: "The Mayor was reading. Not government reports. A history book. I recognized the cover immediately. It was about the rise of modern East Asia.",
                        id: "Wali kota sedang membaca. Bukan laporan pemerintahan. Sebuah buku sejarah. Saya langsung mengenali sampulnya. Buku itu membahas kebangkitan Asia Timur modern." },
                    { en: "He looked up.",
                        id: "Beliau mengangkat kepala." },
                    { en: "\"Finished your reports?\"",
                        id: "\"Laporanmu sudah selesai?\"" },
                    { en: "\"All submitted.\"",
                        id: "\"Sudah semuanya.\"" },
                    { en: "\"Tomorrow?\"",
                        id: "\"Besok?\"" },
                    { en: "\"Already confirmed.\"",
                        id: "\"Sudah terkonfirmasi.\"" },
                    { en: "He nodded toward the chair across from him.",
                        id: "Beliau mengangguk ke arah kursi di depannya." },
                    { en: "\"Then sit.\"",
                        id: "\"Kalau begitu, duduklah.\"" },
                    { en: "For a few minutes, neither of us spoke. The room was lined with books. History. Economics. Urban planning. Public administration. Hardly any political memoirs. I had noticed that long ago.",
                        id: "Beberapa menit kami tidak berbicara. Ruangan itu dipenuhi rak buku. Sejarah. Ekonomi. Perencanaan kota. Administrasi publik. Hampir tidak ada memoar politik. Saya sudah menyadarinya sejak lama." },
                    { en: "The Mayor closed his book.",
                        id: "Wali kota menutup bukunya." },
                    { en: "\"Why do people misunderstand China's rise?\"",
                        id: "\"Mengapa banyak orang salah memahami kebangkitan Tiongkok?\"" },
                    { en: "I answered carefully.",
                        id: "Saya menjawab dengan hati-hati." },
                    { en: "\"They see factories. They don't see institutions.\"",
                        id: "\"Mereka melihat pabrik. Mereka tidak melihat lembaga.\"" },
                    { en: "He nodded.",
                        id: "Beliau mengangguk." },
                    { en: "\"And Singapore?\"",
                        id: "\"Kalau Singapura?\"" },
                    { en: "\"They see skyscrapers. They don't see a civil service that functions every morning.\"",
                        id: "\"Mereka melihat gedung pencakar langit. Mereka tidak melihat birokrasi yang bekerja setiap pagi.\"" },
                    { en: "The Mayor smiled faintly.",
                        id: "Wali kota tersenyum tipis." },
                    { en: "\"Exactly.\"",
                        id: "\"Tepat.\"" },
                    { en: "He stood and walked toward the window overlooking the city. Three years ago, much of the eastern district had flooded every rainy season. Now retention ponds reflected the evening lights. A BRT bus passed below. Workers walked home along wider sidewalks. Progress did not announce itself. It simply became ordinary.",
                        id: "Beliau berdiri dan berjalan menuju jendela yang menghadap kota. Tiga tahun lalu, sebagian besar kawasan timur selalu banjir setiap musim hujan. Kini kolam-kolam retensi memantulkan cahaya senja. Sebuah bus BRT melintas di bawah. Para pekerja berjalan pulang di trotoar yang lebih lebar. Kemajuan tidak pernah mengumumkan dirinya. Ia hanya menjadi sesuatu yang biasa." },
                    { en: "\"Do you know what the old system rewarded?\"",
                        id: "\"Tahukah kamu apa yang dihargai oleh sistem lama?\"" },
                    { en: "I remained silent.",
                        id: "Saya tetap diam." },
                    { en: "\"Connections. Family names. Loyalty to individuals.\"",
                        id: "\"Koneksi. Nama keluarga. Kesetiaan kepada individu.\"" },
                    { en: "He turned toward me.",
                        id: "Beliau menoleh kepada saya." },
                    { en: "\"What should this system reward?\"",
                        id: "\"Apa yang harus dihargai oleh sistem sekarang?\"" },
                    { en: "\"Competence. Integrity. Performance.\"",
                        id: "\"Kompetensi. Integritas. Kinerja.\"" },
                    { en: "He nodded once.",
                        id: "Beliau mengangguk sekali." },
                    { en: "Then he said something he had never said before.",
                        id: "Kemudian beliau mengatakan sesuatu yang belum pernah beliau katakan sebelumnya." },
                    { en: "\"Do you know why you're sitting in that chair?\"",
                        id: "\"Tahukah kamu mengapa kamu duduk di kursi itu?\"" },
                    { en: "\"I was appointed, Sir.\"",
                        id: "\"Karena saya ditunjuk, Pak.\"" },
                    { en: "\"No. You were selected.\"",
                        id: "\"Bukan. Kamu diseleksi.\"" },
                    { en: "He sat back down.",
                        id: "Beliau kembali duduk." },
                    { en: "\"In the old Indonesia... someone occupying your chair might simply have been the nephew of a minister. Or the son of a party official. Or the relative of a governor. They would have learned while making mistakes. And the public would have paid for those mistakes.\"",
                        id: "\"Di Indonesia yang lama... orang yang duduk di kursimu mungkin hanya keponakan seorang menteri. Atau anak seorang petinggi partai. Atau kerabat seorang gubernur. Mereka belajar sambil membuat kesalahan. Dan masyarakatlah yang membayar harga dari kesalahan itu.\"" },
                    { en: "He looked directly at me.",
                        id: "Beliau memandang saya tepat di mata." },
                    { en: "\"You are here because the State invested in competence. Top graduate. Three years in Indonesia Mengajar. Outstanding field evaluations. Administrative assessment. Ethics assessment. Psychological assessment. Security clearance.\"",
                        id: "\"Kamu ada di sini karena negara berinvestasi pada kompetensi. Lulusan terbaik. Tiga tahun di Indonesia Mengajar. Evaluasi lapangan yang sangat baik. Uji administrasi. Uji etika. Uji psikologi. Pemeriksaan keamanan.\"" },
                    { en: "He paused.",
                        id: "Beliau berhenti sejenak." },
                    { en: "\"You were not hired. You were entrusted.\"",
                        id: "\"Kamu bukan sekadar diterima bekerja. Kamu dipercaya.\"" },
                    { en: "I remembered the selection process. Thousands of applicants. Dozens remaining. Weeks of interviews. Simulations. Case studies. Background investigations. It had been exhausting. Now I understood why.",
                        id: "Saya teringat proses seleksi itu. Ribuan pelamar. Puluhan tersisa. Minggu-minggu wawancara. Simulasi. Studi kasus. Pemeriksaan latar belakang. Proses itu melelahkan. Kini saya memahami alasannya." },
                    { en: "The Mayor continued.",
                        id: "Wali kota melanjutkan." },
                    { en: "\"This office isn't defended once every election. It is defended every morning. Every procurement file. Every appointment request. Every budget revision. Every phone call asking for an exception.\"",
                        id: "\"Jabatan ini tidak dipertahankan setiap lima tahun sekali. Jabatan ini dipertahankan setiap pagi. Setiap berkas pengadaan. Setiap permohonan audiensi. Setiap revisi anggaran. Setiap telepon yang meminta pengecualian.\"" },
                    { en: "He tapped the table gently.",
                        id: "Beliau mengetuk meja pelan." },
                    { en: "\"This fight is continuous. It has to be defended every single day.\"",
                        id: "\"Perjuangan ini terus-menerus. Ia harus dipertahankan setiap hari.\"" },
                    { en: "I asked quietly, \"And if one day we become tired?\"",
                        id: "Saya bertanya pelan, \"Kalau suatu hari nanti kita lelah?\"" },
                    { en: "The Mayor answered immediately.",
                        id: "Wali kota langsung menjawab." },
                    { en: "\"Then we rest. We do not compromise.\"",
                        id: "\"Maka kita beristirahat. Bukan berkompromi.\"" },
                    { en: "Outside, the call to prayer echoed across the city. For a moment, neither of us spoke.",
                        id: "Di luar, azan magrib bergema di seluruh kota. Beberapa saat kami kembali diam." },
                    { en: "Then my secure phone vibrated. Priority notification. Security Directorate. I read it once. Then again.",
                        id: "Kemudian ponsel dinas terenkripsi saya bergetar. Notifikasi prioritas. Direktorat Pengamanan. Saya membacanya sekali. Lalu sekali lagi." },
                    { en: "The Mayor noticed.",
                        id: "Wali kota menyadarinya." },
                    { en: "\"What is it?\"",
                        id: "\"Ada apa?\"" },
                    { en: "I handed him the phone. The message was brief.",
                        id: "Saya menyerahkan ponsel itu. Pesannya singkat." },
                    { en: "Credible intelligence indicates organized actors are planning coordinated intimidation against senior municipal officials within the next seventy-two hours. Protective protocols elevated to Level Three.",
                        id: "Intelijen yang dapat dipercaya menunjukkan adanya rencana intimidasi terkoordinasi terhadap pejabat senior pemerintah kota dalam tujuh puluh dua jam ke depan. Protokol pengamanan dinaikkan ke Level Tiga." },
                    { en: "He read it without changing expression. Then returned the phone.",
                        id: "Beliau membacanya tanpa mengubah ekspresi. Lalu mengembalikan ponsel itu kepada saya." },
                    { en: "\"Tomorrow's schedule?\"",
                        id: "\"Jadwal besok?\"" },
                    { en: "\"Unchanged.\"",
                        id: "\"Tidak berubah.\"" },
                    { en: "\"Site inspection?\"",
                        id: "\"Inspeksi lapangan?\"" },
                    { en: "\"Still at 08:00.\"",
                        id: "\"Tetap pukul 08.00.\"" },
                    { en: "He stood.",
                        id: "Beliau berdiri." },
                    { en: "\"Good. If we cancel because of threats... they've already succeeded.\"",
                        id: "\"Bagus. Kalau kita membatalkan kegiatan karena ancaman... berarti mereka sudah menang.\"" },
                    { en: "I closed my notebook. Tomorrow's agenda remained exactly as it had been. Only the security detail would become larger. The work itself would not change.",
                        id: "Saya menutup buku catatan saya. Agenda besok tetap persis seperti semula. Hanya jumlah personel pengamanan yang akan bertambah. Pekerjaannya tidak akan berubah." }
                ]
            }, {
                id: "ch9",
                title: "Chapter 9 — Level Three",
                subtitle: "Courage is not the absence of danger. It is refusing to negotiate with it.",
                blocks: [
                    { en: "05:27. The schedule began exactly on time. Nothing had changed. Except the security detail.",
                        id: "05.27. Jadwal dimulai tepat waktu. Tidak ada yang berubah. Kecuali pengamanannya." },
                    { en: "Two armored vehicles. A route cleared fifteen minutes in advance. Counter-surveillance teams. Plainclothes officers. Emergency medical unit. Level Three.",
                        id: "Dua kendaraan lapis baja. Rute disterilkan lima belas menit sebelumnya. Tim kontra-pengawasan. Petugas berpakaian sipil. Tim medis siaga. Level Tiga." },
                    { en: "I reviewed the day's itinerary one final time.",
                        id: "Saya memeriksa kembali agenda hari itu untuk terakhir kalinya." },
                    { en: "08:00. Inspection of the Eastern Flood Diversion Canal. 10:30. Affordable housing project. 13:00. Budget control meeting. 15:30. Community health center inauguration.",
                        id: "08.00. Inspeksi Kanal Pengendali Banjir Timur. 10.30. Proyek perumahan rakyat. 13.00. Rapat pengendalian anggaran. 15.30. Peresmian puskesmas." },
                    { en: "Nothing cancelled. Nothing postponed.",
                        id: "Tidak ada yang dibatalkan. Tidak ada yang ditunda." },
                    { en: "The Chief of Municipal Security entered. He handed me a sealed folder.",
                        id: "Kepala Pengamanan Pemerintah Kota memasuki ruangan. Beliau menyerahkan sebuah map tertutup." },
                    { en: "\"Threat assessment.\"",
                        id: "\"Penilaian ancaman.\"" },
                    { en: "I opened it. Three pages. The conclusion occupied only one sentence.",
                        id: "Saya membukanya. Tiga halaman. Kesimpulannya hanya satu kalimat." },
                    { en: "Probability of attempted disruption: High. Probability of successful attack: Low.",
                        id: "Probabilitas upaya gangguan: Tinggi. Probabilitas serangan berhasil: Rendah." },
                    { en: "The Mayor entered moments later.",
                        id: "Beberapa saat kemudian wali kota masuk." },
                    { en: "\"Brief me.\"",
                        id: "\"Lapor.\"" },
                    { en: "I summarized everything in less than ninety seconds. Threat level. Alternative routes. Medical facilities. Emergency communications. Media monitoring.",
                        id: "Saya merangkum semuanya dalam waktu kurang dari sembilan puluh detik. Tingkat ancaman. Rute alternatif. Fasilitas medis. Komunikasi darurat. Pemantauan media." },
                    { en: "He listened without interruption. When I finished, he asked only one question.",
                        id: "Beliau mendengarkan tanpa menyela. Setelah saya selesai, beliau hanya mengajukan satu pertanyaan." },
                    { en: "\"Can the inspection proceed safely?\"",
                        id: "\"Apakah inspeksi bisa dilaksanakan dengan aman?\"" },
                    { en: "\"Yes.\"",
                        id: "\"Bisa.\"" },
                    { en: "\"Then we proceed.\"",
                        id: "\"Kalau begitu kita laksanakan.\"" },
                    { en: "08:00. The Eastern Canal stretched nearly five kilometers. Three years ago, this district flooded six or seven times every rainy season. Today, workers were installing the final floodgates. Children crossed a temporary bridge on their way to school. Concrete replaced mud. Drainage replaced stagnant water.",
                        id: "08.00. Kanal Timur membentang hampir lima kilometer. Tiga tahun lalu kawasan ini banjir enam atau tujuh kali setiap musim hujan. Hari itu para pekerja sedang memasang pintu air terakhir. Anak-anak menyeberangi jembatan sementara menuju sekolah. Beton menggantikan lumpur. Drainase menggantikan genangan air." },
                    { en: "The project engineer approached.",
                        id: "Insinyur proyek mendekat." },
                    { en: "\"Good morning, Sir.\"",
                        id: "\"Selamat pagi, Pak.\"" },
                    { en: "He unfolded a large blueprint.",
                        id: "Beliau membuka gambar teknik berukuran besar." },
                    { en: "\"Budget utilization stands at forty-eight percent. Physical progress is fifty-one percent. We are two weeks ahead of schedule.\"",
                        id: "\"Realisasi anggaran mencapai empat puluh delapan persen. Kemajuan fisik lima puluh satu persen. Kami dua minggu lebih cepat dari jadwal.\"" },
                    { en: "The Mayor asked immediately, \"Any approved variation orders?\"",
                        id: "Wali kota langsung bertanya, \"Ada perubahan pekerjaan yang disetujui?\"" },
                    { en: "\"None.\"",
                        id: "\"Tidak ada.\"" },
                    { en: "\"Cost overruns?\"",
                        id: "\"Pembengkakan biaya?\"" },
                    { en: "\"None.\"",
                        id: "\"Tidak ada.\"" },
                    { en: "He nodded.",
                        id: "Beliau mengangguk." },
                    { en: "\"Good.\"",
                        id: "\"Baik.\"" },
                    { en: "Suddenly, one of the security officers spoke into his radio. His voice remained calm.",
                        id: "Tiba-tiba salah seorang petugas keamanan berbicara melalui radionya. Suaranya tetap tenang." },
                    { en: "\"Group approaching from the west.\"",
                        id: "\"Ada sekelompok orang mendekat dari arah barat.\"" },
                    { en: "Another officer replied.",
                        id: "Petugas lain menjawab." },
                    { en: "\"Approximately twenty individuals. Banners. No visible weapons.\"",
                        id: "\"Sekitar dua puluh orang. Membawa spanduk. Tidak terlihat senjata.\"" },
                    { en: "Within seconds, security quietly adjusted their positions. No shouting. No panic.",
                        id: "Dalam hitungan detik, petugas keamanan mengubah posisi mereka dengan tenang. Tanpa teriakan. Tanpa kepanikan." },
                    { en: "The Mayor continued examining the floodgate mechanism.",
                        id: "Wali kota tetap memeriksa mekanisme pintu air." },
                    { en: "The group stopped about fifty meters away. They began shouting slogans.",
                        id: "Kelompok itu berhenti sekitar lima puluh meter dari kami. Mereka mulai meneriakkan slogan." },
                    { en: "\"Development has stopped!\"",
                        id: "\"Pembangunan dihentikan!\"" },
                    { en: "\"The Mayor is anti-business!\"",
                        id: "\"Wali kota anti-pengusaha!\"" },
                    { en: "\"Release Procurement Package 18-C!\"",
                        id: "\"Lanjutkan Paket Pengadaan 18-C!\"" },
                    { en: "Television cameras appeared almost immediately. Too quickly. They had clearly been informed beforehand.",
                        id: "Kamera televisi segera bermunculan. Terlalu cepat. Jelas mereka sudah diberi tahu sebelumnya." },
                    { en: "I looked toward the Mayor.",
                        id: "Saya memandang wali kota." },
                    { en: "\"Sir?\"",
                        id: "\"Pak?\"" },
                    { en: "He was reading the concrete quality report. Without looking up, he asked, \"Compressive strength?\"",
